backend:
    name: git-gateway
    branch: main

media_folder: 'src/assets/images'
public_folder: 'public/images'

collections:
    - name: 'blog'
      label: 'Blog'
      folder: 'src/content/blog'

      create: true
      fields:
          - {
                label: 'Layout',
                name: 'layout',
                widget: 'hidden',
                default: 'blog',
            }
          - { label: 'Title', name: 'title', widget: 'string' }
          - { label: 'Publish Date', name: 'date', widget: 'datetime' }
          - { label: 'Body', name: 'body', widget: 'markdown' }
